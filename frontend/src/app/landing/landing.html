<h1>Real Estate Inquiry</h1>
<form [formGroup]="inquiryForm" (ngSubmit)="submit()">
  <label>
    Name
    <input formControlName="name" />
  </label>
  <label>
    Email
    <input formControlName="email" type="email" />
  </label>
  <label>
    Phone
    <input formControlName="phone" />
  </label>
  <label>
    Area
    <input formControlName="area" />
  </label>
  <label>
    Budget
    <input formControlName="budget" />
  </label>
  <label>
    Locality
    <input formControlName="locality" />
  </label>
  <button type="submit">Submit</button>
</form>
